<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hossier</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Page-specific styles for the home page.
       Colors and font come from the global tokens in styles.css. */
    body {
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
    }
    .logo { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.02em; }
    nav a {
      color: var(--color-white);
      opacity: 0.7;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    nav a:hover { opacity: 1; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .accent { color: var(--color-accent); }
    p.lead {
      color: var(--color-white);
      opacity: 0.7;
      font-size: 1.2rem;
      max-width: 32rem;
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-block;
      background: var(--color-accent);
      color: var(--color-black);
      padding: 0.85rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.15s, opacity 0.2s;
    }
    .cta:hover { transform: translateY(-2px); opacity: 0.92; }
    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      color: var(--color-white);
      opacity: 0.5;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Hossier</div>
    <nav>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <h1>Welcome to <span class="accent">Hossier</span></h1>
    <p class="lead">
      This is the start of something great. Replace this text with what
      Hossier is all about — your tagline, your mission, your offer.
    </p>
    <a class="cta" href="#contact">Get in touch</a>
  </main>

  <footer>
    &copy; 2026 Hossier. All rights reserved.
  </footer>
</body>
</html>
